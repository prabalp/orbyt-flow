services:
  orbyt-flow:
    build: .
    image: orbyt-flow:latest
    container_name: orbyt-flow
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - orbyt-data:/data
    environment:
      - PORT=8085
      - FLOWENGINE_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  orbyt-data:
